name: MoDx Multi-Arch Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            cc: gcc
            cflags: "-fPIC -Wall -Wextra -static"
            extra_pkgs: "libmbedtls-dev"

          - platform: linux-arm64
            cc: aarch64-linux-gnu-gcc
            cflags: "-fPIC -Wall -Wextra -static"
            extra_pkgs: "gcc-aarch64-linux-gnu"

    steps:
      - uses: actions/checkout@v4

      - name: Install base tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install extra packages
        if: matrix.extra_pkgs != ''
        run: sudo apt-get install -y ${{ matrix.extra_pkgs }}

      - name: Build mbedTLS for ARM64
        if: matrix.platform == 'linux-arm64'
        run: |
          cd /tmp
          wget -q https://github.com/Mbed-TLS/mbedtls/archive/refs/tags/v3.6.0.tar.gz
          tar xzf v3.6.0.tar.gz
          cd mbedtls-3.6.0
          mkdir build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_PROGRAMS=OFF \
            -DENABLE_TESTING=OFF \
            -DUSE_SHARED_MBEDTLS_LIBRARY=OFF
          make -j$(nproc)
          echo "MBEDTLS_STATIC=/tmp/mbedtls-3.6.0/build/library" >> $GITHUB_ENV

      - name: Build
        run: |
          if [ "${{ matrix.platform }}" = "linux-arm64" ]; then
            ${{ matrix.cc }} ${{ matrix.cflags }} -o modx main.c modx_lib.c \
              -I/tmp/mbedtls-3.6.0/include \
              -L$MBEDTLS_STATIC \
              -lpthread -lm -lmbedtls -lmbedx509 -lmbedcrypto
          else
            ${{ matrix.cc }} ${{ matrix.cflags }} -o modx main.c modx_lib.c \
              -lpthread -lm -lmbedtls -lmbedx509 -lmbedcrypto
          fi

      - name: Package into ZIP
        run: |
          zip MoDx-${{ matrix.platform }}.zip modx

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoDx-${{ matrix.platform }}
          path: ./MoDx-${{ matrix.platform }}.zip

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Generate timestamp
        id: ts
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Download all ZIP artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly-${{ steps.ts.outputs.time }}
          name: "MoDx Nightly ${{ steps.ts.outputs.time }}"
          files: ./artifacts/MoDx-*/*.zip
          draft: false
          prerelease: true
          body: |

            Supported architectures:
            - Linux x86_64
            - Linux ARM64

            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}