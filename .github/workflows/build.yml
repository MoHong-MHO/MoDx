name: Build and Test MoDx

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmbedtls-dev
    - name: Compile static
      run: |
        gcc -static -o modx main.c modx_lib.c -lpthread -lm -lmbedtls -lmbedx509 -lmbedcrypto -Wall -Wextra
    - name: Test
      run: |
        ./modx || true
        file modx
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: modx-linux-x86_64
        path: modx

  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Install cross-compile tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu libmbedtls-dev
    - name: Compile static
      run: |
        aarch64-linux-gnu-gcc -static -o modx main.c modx_lib.c -lpthread -lm -lmbedtls -lmbedx509 -lmbedcrypto -Wall -Wextra
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: modx-linux-arm64
        path: modx

  release:
    name: Create Release Package
    needs: [ build-linux-x86_64, build-linux-arm64 ]
    runs-on: ubuntu-22.04
    if: github.event_name == 'release'
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Package
      run: |
        mkdir release
        cp artifacts/modx-linux-x86_64/modx release/modx-linux-x86_64
        cp artifacts/modx-linux-arm64/modx release/modx-linux-arm64
        cd release && tar -czf ../modx-${{ github.ref_name }}.tar.gz *
    - name: Upload release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./modx-${{ github.ref_name }}.tar.gz
        asset_name: modx-${{ github.ref_name }}.tar.gz
        asset_content_type: application/gzip