release:
  name: Create Release Package
  needs: [build-linux-x86_64, build-linux-arm64]
  runs-on: ubuntu-22.04
  if: github.event_name == 'push' && github.ref_name == 'main'
  permissions:
    contents: write
  steps:
  - uses: actions/checkout@v4

  - name: Download all artifacts
    uses: actions/download-artifact@v4
    with:
      path: artifacts

  - name: Prepare release package
    run: |
      set -e
      mkdir -p release/linux-x86_64
      mkdir -p release/linux-arm64
      cp artifacts/modx-linux-x86_64-lib/libmodx.so release/linux-x86_64/
      cp artifacts/modx-linux-x86_64-exe/modx release/linux-x86_64/
      cp artifacts/modx-linux-arm64-lib/libmodx.so release/linux-arm64/
      cp artifacts/modx-linux-arm64-exe/modx release/linux-arm64/
      cd release && tar -czf ../modx-${{ github.ref_name }}.tar.gz *
      cd ..
      ls -lh modx-${{ github.ref_name }}.tar.gz

  - name: Auto Release (Nightly)
    uses: softprops/action-gh-release@v1
    with:
      tag_name: nightly-${{ github.run_number }}
      name: "Nightly Build #${{ github.run_number }}"
      body: "Auto-compiled from commit ${{ github.sha }}"
      draft: false
      prerelease: true
      files: modx-${{ github.ref_name }}.tar.gz
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}