name: MoDx Multi-Arch Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            cc: gcc
            cflags: "-fPIC -Wall -Wextra"
            extra_pkgs: ""

          - platform: linux-arm64
            cc: aarch64-linux-gnu-gcc
            cflags: "-fPIC -Wall -Wextra"
            extra_pkgs: "gcc-aarch64-linux-gnu"

    steps:
      - uses: actions/checkout@v4

      - name: Install base tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install extra packages
        if: matrix.extra_pkgs != ''
        run: sudo apt-get install -y ${{ matrix.extra_pkgs }}

      - name: Build
        run: |
          ${{ matrix.cc }} ${{ matrix.cflags }} -shared -o libmodx.so modx_lib.c -lpthread -lm
          ${{ matrix.cc }} ${{ matrix.cflags }} -o modx main.c -L. -lmodx -lpthread -lm -Wl,-rpath,.

      - name: Package into ZIP
        run: |
          zip MoDx-${{ matrix.platform }}.zip libmodx.so modx

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoDx-${{ matrix.platform }}
          path: ./MoDx-${{ matrix.platform }}.zip

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Generate timestamp
        id: ts
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Download all ZIP artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly-${{ steps.ts.outputs.time }}
          name: "MoDx Nightly ${{ steps.ts.outputs.time }}"
          files: ./artifacts/MoDx-*/*.zip
          draft: false
          prerelease: true
          body: |

            Supported architectures:
            - Linux x86_64
            - Linux ARM64

            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}