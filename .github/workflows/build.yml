name: MoDx Multi-Arch Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            cc: gcc
            target: x86_64-linux-gnu
            cmake_extra: ""

          - platform: linux-arm64
            cc: aarch64-linux-gnu-gcc
            target: aarch64-linux-gnu
            cmake_extra: "-DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64"

    steps:
      - uses: actions/checkout@v4

      - name: Install base tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Install extra packages (ARM64 cross-compile)
        if: matrix.platform == 'linux-arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build mbedTLS static library with -fPIC
        run: |
          cd /tmp
          wget -q https://github.com/Mbed-TLS/mbedtls/archive/refs/tags/v2.28.8.tar.gz
          tar xzf v2.28.8.tar.gz
          cd mbedtls-2.28.8
          mkdir build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            ${{ matrix.cmake_extra }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_PROGRAMS=OFF \
            -DENABLE_TESTING=OFF \
            -DUSE_SHARED_MBEDTLS_LIBRARY=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          make -j$(nproc)
          echo "MBEDTLS_STATIC=/tmp/mbedtls-2.28.8/build/library" >> $GITHUB_ENV
          echo "MBEDTLS_INCLUDE=/tmp/mbedtls-2.28.8/include" >> $GITHUB_ENV

      - name: Build libmodx.so (mbedTLS static-linked inside)
        run: |
          SOURCES="lib/core/*.c lib/download/*.c lib/net/*.c lib/checksum/*.c"
          ${{ matrix.cc }} -fPIC -shared -Os -s -o libmodx.so $SOURCES \
            -I$MBEDTLS_INCLUDE \
            -L$MBEDTLS_STATIC \
            -lpthread -lm \
            -Wl,-Bstatic -lmbedtls -lmbedx509 -lmbedcrypto -Wl,-Bdynamic

      - name: Build modx (only depends on libmodx.so)
        run: |
          SOURCES="main.c main/cli/*.c main/ui/*.c main/batch/*.c"
          ${{ matrix.cc }} -Os -s -o modx $SOURCES -L. -lmodx \
            -I$MBEDTLS_INCLUDE \
            -Wl,-rpath,.

      - name: Package into ZIP
        run: |
          zip MoDx-${{ matrix.platform }}.zip libmodx.so modx

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoDx-${{ matrix.platform }}
          path: ./MoDx-${{ matrix.platform }}.zip

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Generate timestamp
        id: ts
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Download all ZIP artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly-${{ steps.ts.outputs.time }}
          name: "MoDx Nightly ${{ steps.ts.outputs.time }}"
          files: ./artifacts/MoDx-*/*.zip
          draft: false
          prerelease: true
          body: |

            Supported architectures:
            - Linux x86_64
            - Linux ARM64

            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}